<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Korean Connect ♡ Vocabulary</title>

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">

  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <script src="nav.js"></script>

  <style>
    :root {
      --bg-soft:      #fffaf5;
      --primary-pink:  #ff9aa2;
      --primary-red:   #ff6b6b;
      --mint:          #a8e6cf;
      --teal:          #2a9d8f;
      --light:         #ffffff;
      --text-dark:     #2d3436;
      --glow:          rgba(255, 154, 162, 0.25);
      --glow-mint:     rgba(168, 230, 207, 0.3);
      --soft-blue:     #e8f4fd;
      --lavender:      #f0e6ff;
      --peach:         #fff0e6;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Noto Sans TC', 'Noto Sans KR', system-ui, sans-serif;
      background: linear-gradient(135deg, var(--bg-soft) 0%, #f0fff5 100%);
      color: var(--text-dark);
      line-height: 1.6;
    }

    /* Navigation */
    nav {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(255,154,162,0.18);
      z-index: 1000;
      padding: 16px 5%;
      display: flex;
      justify-content: space-between;
      align-items: center;
      box-shadow: 0 4px 20px rgba(0,0,0,0.06);
    }

    .logo {
      font-size: 1.8rem;
      font-weight: 700;
      color: var(--primary-pink);
      text-decoration: none;
    }

    .logo span {
      color: var(--teal);
    }

    .nav-links {
      display: flex;
      gap: 36px;
      list-style: none;
    }

    .nav-links a {
      color: var(--text-dark);
      text-decoration: none;
      font-weight: 500;
      font-size: 1.05rem;
      transition: all 0.3s;
    }

    .nav-links a:hover,
    .nav-links a.active {
      color: var(--primary-pink);
      transform: translateY(-2px);
    }

    /* Hero Section */
    .hero {
      background: linear-gradient(135deg, var(--primary-pink) 30%, var(--mint) 70%);
      color: white;
      text-align: center;
      padding: 180px 6% 140px;
      position: relative;
      overflow: hidden;
      margin-top: 80px;
    }

    .hero::before {
      content: '';
      position: absolute;
      inset: -50%;
      background: radial-gradient(circle at 40% 60%, rgba(255,255,255,0.3) 0%, transparent 70%);
      animation: float 20s infinite linear;
    }

    @keyframes float {
      0% { transform: translate(0,0) rotate(0deg); }
      100% { transform: translate(100%, 50%) rotate(360deg); }
    }

    .hero h1 {
      font-size: 4.2rem;
      font-weight: 800;
      margin-bottom: 20px;
      text-shadow: 0 4px 20px rgba(0,0,0,0.3);
      position: relative;
      z-index: 2;
    }

    .hero .subtitle {
      font-size: 1.6rem;
      max-width: 800px;
      margin: 0 auto 40px;
      opacity: 0.95;
      position: relative;
      z-index: 2;
    }

    .hero .korean-text {
      font-size: 2.5rem;
      font-weight: 600;
      margin-bottom: 30px;
      opacity: 0.9;
    }

    /* Vocabulary Categories */
    .vocab-section {
      padding: 100px 6%;
      text-align: center;
    }

    .vocab-section h2 {
      font-size: 3.2rem;
      color: var(--primary-pink);
      margin-bottom: 60px;
      position: relative;
      display: inline-block;
    }

    .vocab-section h2::after {
      content: '📚';
      position: absolute;
      top: -10px;
      right: -40px;
      font-size: 2rem;
    }

    .vocab-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
      gap: 40px;
      max-width: 1400px;
      margin: 0 auto;
    }

    .vocab-category {
      background: var(--light);
      border-radius: 24px;
      padding: 40px 30px;
      box-shadow: 0 12px 40px rgba(0,0,0,0.08);
      transition: all 0.4s ease;
      border: 2px solid transparent;
      position: relative;
      overflow: hidden;
    }

    .vocab-category::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 4px;
      background: linear-gradient(90deg, var(--primary-pink), var(--mint));
    }

    .vocab-category:hover {
      transform: translateY(-12px);
      box-shadow: 0 24px 60px rgba(0,0,0,0.15);
      border-color: var(--mint);
    }

    .category-icon {
      font-size: 3.5rem;
      margin-bottom: 20px;
      display: block;
    }

    .vocab-category h3 {
      font-size: 1.8rem;
      color: var(--teal);
      margin-bottom: 16px;
    }

    .vocab-category p {
      color: #666;
      font-size: 1rem;
      margin-bottom: 24px;
    }

    .vocab-list {
      text-align: left;
      background: var(--bg-soft);
      border-radius: 16px;
      padding: 20px;
      margin-top: 20px;
    }

    .vocab-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 0;
      border-bottom: 1px solid rgba(255,154,162,0.2);
    }

    .vocab-item:last-child {
      border-bottom: none;
    }

    .korean-word {
      font-size: 1.3rem;
      font-weight: 600;
      color: var(--text-dark);
      font-family: 'Noto Sans KR', sans-serif;
    }

    .english-word {
      color: #777;
      font-size: 0.95rem;
    }

    .vocab-btn {
      background: var(--primary-pink);
      color: white;
      padding: 8px 16px;
      border-radius: 20px;
      text-decoration: none;
      font-weight: 600;
      font-size: 0.9rem;
      transition: all 0.3s;
      display: inline-block;
      margin-top: 20px;
    }

    .vocab-btn:hover {
      background: var(--primary-red);
      transform: scale(1.05);
    }

    /* Practice Section */
    .practice-section {
      padding: 100px 6%;
      background: linear-gradient(to right, var(--soft-blue), var(--lavender));
      text-align: center;
    }

    .practice-section h2 {
      font-size: 3rem;
      color: var(--teal);
      margin-bottom: 20px;
    }

    .practice-section .subtitle {
      font-size: 1.4rem;
      color: #555;
      margin-bottom: 60px;
      max-width: 700px;
      margin-left: auto;
      margin-right: auto;
    }

    .practice-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 30px;
      max-width: 1200px;
      margin: 0 auto;
    }

    .practice-card {
      background: white;
      border-radius: 20px;
      padding: 30px;
      box-shadow: 0 8px 30px rgba(0,0,0,0.1);
      transition: all 0.3s ease;
    }

    .practice-card:hover {
      transform: translateY(-8px);
      box-shadow: 0 16px 40px rgba(0,0,0,0.15);
    }

    .practice-icon {
      font-size: 2.5rem;
      color: var(--primary-pink);
      margin-bottom: 20px;
    }

    .practice-card h3 {
      font-size: 1.4rem;
      color: var(--text-dark);
      margin-bottom: 12px;
    }

    .practice-card p {
      color: #666;
      font-size: 0.95rem;
    }

    /* Resources Section */
    .resources-section {
      padding: 100px 6%;
      text-align: center;
    }

    .resources-section h2 {
      font-size: 2.8rem;
      color: var(--primary-pink);
      margin-bottom: 50px;
    }

    .resources-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
      gap: 40px;
      max-width: 1200px;
      margin: 0 auto;
    }

    .resource-card {
      background: white;
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 12px 40px rgba(0,0,0,0.08);
      transition: all 0.3s ease;
    }

    .resource-card:hover {
      transform: translateY(-8px);
      box-shadow: 0 20px 50px rgba(0,0,0,0.12);
    }

    .resource-header {
      background: linear-gradient(135deg, var(--mint), var(--teal));
      color: white;
      padding: 30px;
      text-align: center;
    }

    .resource-header h3 {
      font-size: 1.6rem;
      margin-bottom: 8px;
    }

    .resource-content {
      padding: 30px;
    }

    .resource-content p {
      color: #666;
      margin-bottom: 20px;
    }

    .resource-link {
      display: inline-block;
      background: var(--primary-pink);
      color: white;
      padding: 12px 24px;
      border-radius: 25px;
      text-decoration: none;
      font-weight: 600;
      transition: all 0.3s;
    }

    .resource-link:hover {
      background: var(--primary-red);
      transform: scale(1.05);
    }

    /* Footer */
    footer {
      padding: 80px 6% 60px;
      background: linear-gradient(to top, #f0fff5, transparent);
      text-align: center;
      color: #555;
      font-size: 1.15rem;
    }

    .footer-content {
      max-width: 800px;
      margin: 0 auto;
    }

    .footer-links {
      display: flex;
      justify-content: center;
      gap: 40px;
      margin: 40px 0;
      flex-wrap: wrap;
    }

    .footer-links a {
      color: var(--teal);
      text-decoration: none;
      font-weight: 600;
      transition: all 0.3s;
    }

    .footer-links a:hover {
      color: var(--primary-pink);
      transform: scale(1.1);
    }

    /* Responsive Design */
    @media (max-width: 900px) {
      .hero h1 { font-size: 3.2rem; }
      .hero .subtitle { font-size: 1.3rem; }
      .vocab-section h2 { font-size: 2.5rem; }
      .nav-links { gap: 24px; font-size: 0.98rem; }
      .vocab-grid { grid-template-columns: 1fr; }
    }

    @media (max-width: 600px) {
      nav { flex-direction: column; gap: 16px; padding: 20px 5%; }
      .nav-links { flex-direction: column; gap: 16px; }
      .hero { padding: 120px 6% 100px; }
      .hero h1 { font-size: 2.8rem; }
      .hero .korean-text { font-size: 2rem; }
      .vocab-section { padding: 60px 6%; }
      .practice-section { padding: 60px 6%; }
      .resources-section { padding: 60px 6%; }
      .footer-links { flex-direction: column; gap: 20px; }
    }
  </script>
</head>

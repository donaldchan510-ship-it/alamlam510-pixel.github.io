<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Korean Connect ♡ Matching Game</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    :root {
      --bg-soft:      #fffaf5;
      --primary-pink:  #ff9aa2;
      --primary-red:   #ff6b6b;
      --mint:          #a8e6cf;
      --teal:          #2a9d8f;
      --light:         #ffffff;
      --text-dark:     #2d3436;
      --glow:          rgba(255, 154, 162, 0.25);
      --glow-mint:     rgba(168, 230, 207, 0.3);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Noto Sans TC', 'Noto Sans KR', system-ui, sans-serif;
      background: linear-gradient(135deg, var(--bg-soft) 0%, #f0fff5 100%);
      color: var(--text-dark);
      line-height: 1.6;
      min-height: 100vh;
    }

    nav {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(255,154,162,0.18);
      z-index: 1000;
      padding: 16px 5%;
      display: flex;
      justify-content: space-between;
      align-items: center;
      box-shadow: 0 4px 20px rgba(0,0,0,0.06);
    }

    .logo {
      font-size: 1.8rem;
      font-weight: 700;
      color: var(--primary-pink);
      text-decoration: none;
    }

    .logo span { color: var(--teal); }

    .nav-links {
      display: flex;
      gap: 36px;
      list-style: none;
    }

    .nav-links a {
      color: var(--text-dark);
      text-decoration: none;
      font-weight: 500;
      font-size: 1.05rem;
      transition: all 0.3s;
    }

    .nav-links a:hover,
    .nav-links a.active {
      color: var(--primary-pink);
      transform: translateY(-2px);
    }

    .main-content {
      padding: 140px 6% 80px;
      max-width: 1200px;
      margin: 0 auto;
    }

    .page-header {
      text-align: center;
      margin-bottom: 50px;
    }

    .page-header h1 {
      font-size: 3rem;
      color: var(--primary-red);
      margin-bottom: 16px;
    }

    .page-header p {
      font-size: 1.2rem;
      color: #636e72;
    }

    .game-container {
      background: var(--light);
      border-radius: 24px;
      box-shadow: 0 10px 40px var(--glow);
      padding: 40px;
      max-width: 600px;
      margin: 0 auto;
    }

    .info-bar {
      display: flex;
      justify-content: space-between;
      margin-bottom: 20px;
      font-size: 1rem;
      color: #636e72;
    }

    .info-bar span { font-weight: 600; }

    .progress-bar {
      height: 10px;
      background: #f0f0f0;
      border-radius: 10px;
      margin-bottom: 32px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--primary-pink), var(--primary-red));
      border-radius: 10px;
      transition: width 0.4s ease;
      width: 0%;
    }

    .question-card {
      background: linear-gradient(135deg, var(--glow) 0%, var(--glow-mint) 100%);
      border-radius: 20px;
      padding: 40px;
      text-align: center;
      margin-bottom: 32px;
    }

    .question-label {
      font-size: 1rem;
      color: #636e72;
      margin-bottom: 12px;
    }

    .question-word {
      font-size: 3rem;
      font-weight: 700;
      color: var(--text-dark);
    }

    .options-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 16px;
    }

    .option {
      padding: 20px;
      border: 2px solid #e0e0e0;
      border-radius: 16px;
      font-size: 1.1rem;
      background: var(--light);
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      text-align: center;
    }

    .option:hover {
      border-color: var(--primary-pink);
      transform: translateY(-4px);
      box-shadow: 0 8px 24px var(--glow);
    }

    .option.correct {
      border-color: var(--mint);
      background: #e8f8f0;
      color: var(--teal);
      animation: matchPop 0.4s ease;
    }

    .option.wrong {
      border-color: var(--primary-red);
      background: #ffeaea;
      color: var(--primary-red);
      animation: shake 0.4s ease;
    }

    .option.disabled {
      pointer-events: none;
    }

    @keyframes matchPop {
      0% { transform: scale(1); }
      50% { transform: scale(1.1); }
      100% { transform: scale(1); }
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20%, 60% { transform: translateX(-8px); }
      40%, 80% { transform: translateX(8px); }
    }

    .result-container {
      text-align: center;
    }

    .result-score {
      font-size: 4rem;
      font-weight: 700;
      background: linear-gradient(135deg, var(--primary-pink), var(--primary-red));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .result-message {
      font-size: 1.3rem;
      color: #636e72;
      margin: 16px 0 32px;
    }

    .btn {
      display: inline-block;
      padding: 16px 32px;
      border: none;
      border-radius: 16px;
      font-size: 1.1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      text-decoration: none;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--primary-pink), var(--primary-red));
      color: white;
    }

    .btn-primary:hover {
      transform: translateY(-3px);
      box-shadow: 0 10px 30px rgba(255, 107, 107, 0.35);
    }

    .hidden { display: none; }

    @media (max-width: 600px) {
      .options-grid { grid-template-columns: 1fr; }
      .page-header h1 { font-size: 2rem; }
    }
  </style>
</head>
<body>
  <nav>
    <a href="index.html" class="logo">Korean<span>Connect</span> ♡</a>
    <ul class="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="vocab.html">Vocab</a></li>
      <li><a href="quiz.html">Quiz</a></li>
      <li><a href="about.html">About</a></li>
    </ul>
  </nav>

  <div class="main-content">
    <div class="page-header">
      <h1>Matching Game</h1>
      <p>Match the Korean word with the correct English translation</p>
    </div>

    <div class="game-container" id="game">
      <div class="info-bar">
        <span id="progressText">Question 1/8</span>
        <span id="scoreText">Score: 0</span>
      </div>
      <div class="progress-bar">
        <div class="progress-fill" id="progressFill"></div>
      </div>
      <div class="question-card">
        <div class="question-label">What does this mean?</div>
        <div class="question-word" id="questionWord">빨강</div>
      </div>
      <div class="options-grid" id="options"></div>
    </div>

    <div class="game-container hidden" id="result">
      <div class="result-container">
        <div class="result-score" id="finalScore">8/8</div>
        <div class="result-message" id="resultMessage">Perfect!</div>
        <a href="matching.html" class="btn btn-primary">Play Again</a>
      </div>
    </div>
  </div>

  <script>
    const pairs = [
      { korean: "빨강", english: "Red" },
      { korean: "파랑", english: "Blue" },
      { korean: "노랑", english: "Yellow" },
      { korean: "초록", english: "Green" },
      { korean: "하양", english: "White" },
      { korean: "검정", english: "Black" },
      { korean: "보라", english: "Purple" },
      { korean: "주황", english: "Orange" },
    ];

    let currentQuestions = [];
    let currentIndex = 0;
    let score = 0;
    let answered = false;

    function shuffle(arr) {
      return arr.sort(() => Math.random() - 0.5);
    }

    function initGame() {
      currentQuestions = shuffle([...pairs]);
      currentIndex = 0;
      score = 0;
      showQuestion();
    }

    function showQuestion() {
      answered = false;
      const q = currentQuestions[currentIndex];
      
      document.getElementById('progressText').textContent = `Question ${currentIndex + 1}/8`;
      document.getElementById('scoreText').textContent = `Score: ${score}`;
      document.getElementById('progressFill').style.width = `${(currentIndex / 8) * 100}%`;
      document.getElementById('questionWord').textContent = q.korean;
      
      const optionsContainer = document.getElementById('options');
      optionsContainer.innerHTML = '';
      
      const wrongOptions = shuffle([...pairs].filter(p => p.english !== q.english)).slice(0, 3);
      const allOptions = shuffle([q, ...wrongOptions]);
      
      allOptions.forEach(opt => {
        const btn = document.createElement('button');
        btn.className = 'option';
        btn.textContent = opt.english;
        btn.onclick = () => selectAnswer(opt.english, q.english);
        optionsContainer.appendChild(btn);
      });
    }

    function selectAnswer(selected, correct) {
      if (answered) return;
      answered = true;
      
      const options = document.querySelectorAll('.option');
      options.forEach(opt => {
        opt.classList.add('disabled');
        if (opt.textContent === correct) opt.classList.add('correct');
        if (opt.textContent === selected && selected !== correct) opt.classList.add('wrong');
      });
      
      if (selected === correct) score++;
      document.getElementById('scoreText').textContent = `Score: ${score}`;
      
      setTimeout(() => {
        currentIndex++;
        if (currentIndex < currentQuestions.length) {
          showQuestion();
        } else {
          showResult();
        }
      }, 1000);
    }

    function showResult() {
      document.getElementById('game').classList.add('hidden');
      document.getElementById('result').classList.remove('hidden');
      document.getElementById('finalScore').textContent = `${score}/8`;
      
      let msg = score >= 7 ? "Perfect! You're amazing! ★" : 
                score >= 5 ? "Great job! Keep it up! ✨" : 
                "Good try! Practice more! 💪";
      document.getElementById('resultMessage').textContent = msg;
    }

    initGame();
  </script>
</body>
</html>
